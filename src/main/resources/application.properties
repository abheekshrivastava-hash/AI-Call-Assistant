# ?? Server ??????????????????????????????????????????
server.port=8080

# ?? Database ?????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:reservations}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? Flyway ???????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ?? Gemini API ???????????????????????????????????????
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-1.5-flash
gemini.max-tokens=400

# ?? Business config ??????????????????????????????????
business.name=My Business
business.hours=Monday to Sunday 10 AM to 9 PM
business.max-party-size=12
business.advance-booking-days=30

# ?? WebSocket ????????????????????????????????????????
cors.allowed-origins=http://localhost:4200

# ?? Swagger UI ???????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# ?? Actuator ?????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ?? Jackson ??????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null